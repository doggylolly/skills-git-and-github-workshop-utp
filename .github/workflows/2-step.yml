name: Paso 2 - Validar Perfil

on:
  workflow_dispatch:
  push:
    branches:
      - 'add-profile/**'
    paths:
      - 'participants/*.md'

permissions:
  contents: write
  actions: write
  issues: write

env:
  STEP_3_FILE: ".github/steps/3-step.md"

jobs:
  find_exercise:
    name: Encontrar Issue del Ejercicio
    uses: skills/exercise-toolkit/.github/workflows/find-exercise-issue.yml@v0.8.1

  check_step_work:
    name: Verificar Paso 2
    runs-on: ubuntu-latest
    needs: [find_exercise]
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Obtener plantillas de respuesta
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.8.1

      - name: Instalar dependencias para validar YAML
        run: npm install gray-matter

      - name: Encontrar último comentario
        id: find-last-comment
        uses: peter-evans/find-comment@v3
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          direction: last

      - name: Actualizar comentario - verificando trabajo
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          file: exercise-toolkit/markdown-templates/step-feedback/checking-work.md
          edit-mode: replace

      - name: Verificar que existe un archivo de perfil válido
        id: check-profile-file
        continue-on-error: true
        run: |
          # Encontrar archivos .md en participants/ que no sean _template.md
          PROFILE_FILES=$(find participants/ -name "*.md" ! -name "_template.md" 2>/dev/null)

          if [ -z "$PROFILE_FILES" ]; then
            echo "No se encontró ningún archivo de perfil en participants/ (excluyendo _template.md)"
            exit 1
          fi

          echo "Archivos de perfil encontrados:"
          echo "$PROFILE_FILES"

      - name: Verificar campos requeridos del perfil
        id: check-profile-fields
        continue-on-error: true
        run: |
          PROFILE_FILES=$(find participants/ -name "*.md" ! -name "_template.md" 2>/dev/null)

          for FILE in $PROFILE_FILES; do
            echo "Validando: $FILE"
            node .github/scripts/validate-profile.js "$FILE"
            if [ $? -ne 0 ]; then
              echo "El archivo $FILE no pasó la validación"
              exit 1
            fi
          done

          echo "Todos los archivos de perfil son válidos"

      - name: Publicar resultados del Paso 2
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          edit-mode: replace
          file: exercise-toolkit/markdown-templates/step-feedback/step-results-table.md
          vars: |
            step_number: 2
            results_table:
              - description: "Existe un archivo de perfil en la carpeta 'participants/'"
                passed: ${{ steps.check-profile-file.outcome == 'success' }}
              - description: "El perfil tiene todos los campos requeridos (name, career, semester, description, hobbies, image, github)"
                passed: ${{ steps.check-profile-fields.outcome == 'success' }}

      - name: Fallar si no pasaron todas las verificaciones
        if: contains(steps.*.outcome, 'failure')
        run: exit 1

  post_next_step_content:
    name: Publicar instrucciones del Paso 3
    needs: [find_exercise, check_step_work]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Obtener plantillas de respuesta
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.8.1

      - name: Publicar comentario - paso completado
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/step-finished-prepare-next-step.md
          vars: |
            next_step_number: 3

      - name: Publicar comentario - contenido del Paso 3
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_3_FILE }}
          vars: |
            login: ${{ github.actor }}

      - name: Publicar comentario - esperando progreso
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/watching-for-progress.md

      - name: Desactivar Paso 2 y activar Paso 3
        run: |
          gh workflow disable "${{ github.workflow }}"
          gh workflow enable "Paso 3 - Validar Commit"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
