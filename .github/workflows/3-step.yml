name: Paso 3 - Validar Commit

on:
  workflow_dispatch:
  push:
    branches:
      - 'add-profile/**'
    paths:
      - 'participants/*.md'

permissions:
  contents: write
  actions: write
  issues: write

env:
  STEP_4_FILE: ".github/steps/4-step.md"
  REVIEW_FILE: ".github/steps/x-review.md"

jobs:
  find_exercise:
    name: Encontrar Issue del Ejercicio
    uses: skills/exercise-toolkit/.github/workflows/find-exercise-issue.yml@v0.8.1

  check_step_work:
    name: Verificar Paso 3
    runs-on: ubuntu-latest
    needs: [find_exercise]
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: Obtener plantillas de respuesta
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.8.1

      - name: Encontrar último comentario
        id: find-last-comment
        uses: peter-evans/find-comment@v3
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          direction: last

      - name: Actualizar comentario - verificando trabajo
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          file: exercise-toolkit/markdown-templates/step-feedback/checking-work.md
          edit-mode: replace

      - name: Verificar que el mensaje del commit sigue el formato correcto
        id: check-commit-message
        continue-on-error: true
        run: |
          # Verificar el mensaje del commit más reciente
          COMMIT_MSG=$(git log -1 --pretty=%s)
          echo "Mensaje del commit: $COMMIT_MSG"

          if [[ "$COMMIT_MSG" =~ ^[Aa]gregar[[:space:]]perfil: ]]; then
            echo "El mensaje del commit sigue el formato correcto: 'Agregar perfil: <nombre>'"
            exit 0
          else
            echo "El mensaje del commit NO sigue el formato requerido."
            echo "Debe comenzar con: 'Agregar perfil: Tu Nombre'"
            echo "Mensaje actual: '$COMMIT_MSG'"
            exit 1
          fi

      - name: Verificar que el archivo de perfil existe y es válido
        id: check-profile-valid
        continue-on-error: true
        run: |
          PROFILE_FILES=$(find participants/ -name "*.md" ! -name "_template.md" 2>/dev/null)

          if [ -z "$PROFILE_FILES" ]; then
            echo "No se encontró archivo de perfil"
            exit 1
          fi

          npm install --quiet gray-matter 2>/dev/null || true

          for FILE in $PROFILE_FILES; do
            node .github/scripts/validate-profile.js "$FILE"
            if [ $? -ne 0 ]; then
              exit 1
            fi
          done

      - name: Publicar resultados del Paso 3
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          edit-mode: replace
          file: exercise-toolkit/markdown-templates/step-feedback/step-results-table.md
          vars: |
            step_number: 3
            results_table:
              - description: "El commit sigue el formato 'Agregar perfil: <Tu Nombre>'"
                passed: ${{ steps.check-commit-message.outcome == 'success' }}
              - description: "El perfil es válido y tiene todos los campos requeridos"
                passed: ${{ steps.check-profile-valid.outcome == 'success' }}

      - name: Fallar si no pasaron todas las verificaciones
        if: contains(steps.*.outcome, 'failure')
        run: exit 1

  post_next_step_content:
    name: Publicar instrucciones finales (Paso 4 + Revisión)
    needs: [find_exercise, check_step_work]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Obtener plantillas de respuesta
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.8.1

      - name: Publicar comentario - paso completado
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/step-finished-prepare-next-step.md
          vars: |
            next_step_number: 4

      - name: Publicar comentario - contenido del Paso 4
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_4_FILE }}
          vars: |
            login: ${{ github.actor }}

      - name: Publicar comentario - revisión final
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.REVIEW_FILE }}

      - name: Desactivar Paso 3
        run: gh workflow disable "${{ github.workflow }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
